name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: input
    id: devices
    attributes:
      label: Related Ajax devices
      description: "Which Ajax device(s) does this feature relate to? (e.g., MotionCam PhOD, DoorProtect Plus)"
      placeholder: "MotionCam PhOD"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else (screenshots, links, examples from other integrations).
    validations:
      required: false
